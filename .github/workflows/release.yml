name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir panel269-wp-plugin
          cp -r assets includes cage-undefined.php panel269-wp-plugin/
          zip -r panel269-wp-plugin.zip panel269-wp-plugin/

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name }}" panel269-wp-plugin.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
